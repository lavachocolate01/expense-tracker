<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lava 記帳小助手 - 期末專題</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .hidden { display: none !important; }

    /* 🌌 深邃宇宙星空背景 */
    body {
      background: radial-gradient(circle at 50% 50%, #0a0f1d 0%, #070a14 70%, #020408 100%) !important;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      color: #ffffff !important;
    }

    /* ✨ 精緻星光層 */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.4) 1.5px, transparent 30px),
        radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 20px);
      background-size: 350px 350px, 200px 200px;
      background-position: 0 0, 40px 60px;
      opacity: 0.6;
      z-index: -1;
      pointer-events: none;
    }

    /* 🔮 基本卡片：黑夜磨砂玻璃質感（用於新增明細、歷史明細、資產剩餘卡片） */
    .card {
      background: rgba(15, 23, 42, 0.85) !important; 
      backdrop-filter: blur(10px) !important;
      -webkit-backdrop-filter: blur(10px) !important;
      border: 1px solid rgba(255, 255, 255, 0.15) !important;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37) !important;
      color: #ffffff !important;
    }

    /* 🟢 總收入卡片：獨立調配綠色玻璃質感 */
    .bg-success {
      background: rgba(25, 135, 84, 0.75) !important;
      border: 1px solid rgba(40, 167, 69, 0.3) !important;
    }

    /* 🔴 總支出卡片：獨立調配紅色玻璃質感 */
    .bg-danger {
      background: rgba(220, 53, 69, 0.75) !important;
      border: 1px solid rgba(220, 53, 69, 0.3) !important;
    }

    /* ✍️ 文字對比修正：卡片內建的標題與標籤變白 */
    .card h2, .card h3, .card h4, .card-title, .card label {
      color: #ffffff !important;
    }

    /* 📥 修正輸入框與下拉選單 */
    .form-control, .form-select {
      background-color: rgba(255, 255, 255, 0.1) !important;
      border: 1px solid rgba(255, 255, 255, 0.2) !important;
      color: #ffffff !important;
    }
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.5) !important;
    }
    .form-control:focus, .form-select:focus {
      background-color: rgba(255, 255, 255, 0.15) !important;
      color: #ffffff !important;
      border-color: #38bdf8 !important;
      box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25) !important;
    }

    /* 📊 歷史明細表格核心修正：不要用預設白底，改成酷炫黑底 */
    .table {
      --bs-table-bg: transparent !important;
      color: #ffffff !important;
    }
    .table th, .table td {
      color: #ffffff !important;
      background-color: transparent !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
      vertical-align: middle;
    }

    /* 頂部歡迎列文字顏色 */
    .container div, .container h2 {
      color: #ffffff !important;
    }

/* 🌌 修正後：去掉 select 後面那個多餘的點，改用正常的 Bootstrap 類別選取器 */
select.form-select {
    color: #ffffff !important; /* 未點開時，框框內的文字維持白色 */
    background-color: #222533 !important; /* 框框底色搭配你的太空深藍 */
}

/* 🎯 修正後：中間用空格隔開，代表選取 .form-select 裡面的 option */
select.form-select option {
    background-color: #1e2230 !important; /* 彈出選單的深色背景 */
    color: #ffffff !important;            /* 彈出選單的白色文字，清晰可見！ */
}
  </style>
</head>
<body class="bg-light">

  <div class="container my-5" style="max-width: 800px;">
    
    <div id="auth-view" class="card shadow-sm p-4">
      <h2 class="text-center mb-4" id="auth-title">會員登入</h2>
      
      <form id="auth-form">
        <div class="mb-3">
          <label class="form-label">帳號</label>
          <input type="text" id="auth-username" class="form-control" required placeholder="請輸入帳號">
        </div>
        <div class="mb-3">
          <label class="form-label">密碼</label>
          <input type="password" id="auth-password" class="form-control" required placeholder="請輸入密碼 (至少 6 碼)">
        </div>
        
        <button type="submit" id="auth-submit-btn" class="btn btn-primary w-100 mb-2">登入</button>
        <button type="button" id="switch-auth-btn" class="btn btn-outline-secondary w-100">還沒有帳號？前往註冊</button>
      </form>
    </div>

    <div id="main-view" class="hidden">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>歡迎回來，<span id="user-display-name" class="text-primary"></span>！</h4>
        <button id="logout-btn" class="btn btn-danger btn-sm">登出</button>
      </div>

      <div class="row g-3 mb-4 text-center">
        <div class="col-md-4">
          <div class="card bg-success text-white p-3 shadow-sm">
            <h6>總收入</h6>
            <h3 id="total-income">$0</h3>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card bg-danger text-white p-3 shadow-sm">
            <h6>總支出</h6>
            <h3 id="total-expense">$0</h3>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card bg-primary text-white p-3 shadow-sm">
            <h6>資產剩餘金額</h6>
            <h3 id="total-balance">$0</h3>
          </div>
        </div>
      </div>

      <div class="card shadow-sm p-4 mb-4">
        <h5>新增記帳明細</h5>
        <form id="account-form" class="row g-3 mt-1">
          <div class="col-md-4">
            <input type="text" id="record-title" class="form-control" placeholder="項目名稱（如：午餐）" required>
          </div>
          <div class="col-md-3">
            <input type="number" id="record-amount" class="form-control" placeholder="金額" required min="1">
          </div>
          <div class="col-md-2">
            <select id="record-type" class="form-select">
              <option value="expense">支出</option>
              <option value="income">收入</option>
            </select>
          </div>
          <div class="col-md-3">
            <select id="record-category" class="form-select">
              <option value="餐飲">餐飲</option>
              <option value="交通">交通</option>
              <option value="娛樂">娛樂</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-success w-100">確認新增</button>
          </div>
        </form>
      </div>

      <div class="card shadow-sm p-4">
        <h5>歷史記帳明細</h5>
        <div class="table-responsive">
          <table class="table table-hover mt-3">
            <thead class="table-dark">
              <tr>
                <th>項目</th>
                <th>分類</th>
                <th>類型</th>
                <th>金額</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="records-tbody">
              </tbody>
          </table>
        </div>
      </div>
    </div> 
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === 'unauthorized') {
        alert('⚠️ 未授權：請先登入系統！');
        window.history.replaceState({}, document.title, window.location.pathname);
    }
  </script>

  <script src="app.js"></script> 
</body>
</html>
